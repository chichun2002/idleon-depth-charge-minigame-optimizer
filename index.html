<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <title>Depth Charge Optimizer</title>
</head>
<body>
  <h2 class="text-3xl font-bold p-4">Depth Charge Sim</h2>

  <div class="flex gap-6 px-4">
    <!-- Left: Upgrades table + Run button + Debug -->
    <div class="flex-1">
      <table class="w-full border border-gray-200 rounded" id="upgrades">
        <thead><tr class="text-xs text-gray-500 border-b border-gray-200">
          <th class="text-left px-3 py-2">Upgrade</th>
          <th class="text-left px-3 py-2">Lv</th>
          <th class="text-right px-3 py-2">Value</th>
          <th class="text-right px-3 py-2">Cost</th>
          <th class="text-left px-3 py-2 w-40">Efficiency</th>
        </tr></thead>
        <tbody id="upg-tbody"></tbody>
      </table>
      <button id="run" class="mt-4 w-full bg-orange-500 hover:bg-orange-600 text-white font-bold text-lg py-3 rounded-lg">Run Simulation</button>
      <button id="optimize" class="mt-2 w-full bg-blue-500 hover:bg-blue-600 text-white font-bold text-lg py-3 rounded-lg">Optimize Next Upgrade</button>
      <pre id="debug" class="text-xs mt-2"></pre>
    </div>

    <!-- Right: Config + Results -->
    <div class="flex-1 flex flex-col gap-4">
      <!-- Config box -->
      <div class="border border-gray-200 rounded p-4 grid grid-cols-2 gap-3">
        <label class="flex flex-col text-xs text-gray-500 font-semibold">Simulations
          <input class="text-sm text-black mt-1" id="sims" type="number" value="10000">
        </label>
        <label class="flex flex-col text-xs text-gray-500 font-semibold">Boss HP
          <input class="text-sm text-black mt-1" id="boss-hp" type="number" value="50">
        </label>
        <label class="flex flex-col text-xs text-gray-500 font-semibold">Bombs
          <input class="text-sm text-black mt-1" id="bombs" type="number" value="3">
        </label>
        <label class="flex flex-col text-xs text-gray-500 font-semibold">Tiles
          <input class="text-sm text-black mt-1" id="tiles" type="number" value="12">
        </label>
        <div class="col-span-2 flex justify-between items-center text-sm">
          <span class="text-gray-500 font-semibold">Base Damage</span>
          <span class="font-mono font-bold" id="base-damage-value">1</span>
        </div>
        <label class="flex flex-col text-xs text-gray-500 font-semibold col-span-2">Base Damage Override
          <input class="text-sm text-black mt-1" id="base-damage-override" type="number" value="" placeholder="Leave empty to use calculated">
        </label>
      </div>

      <!-- Results table -->
      <div id="status" class="text-sm text-gray-500"></div>
      <table class="w-full border border-gray-200 rounded">
        <thead><tr class="text-xs text-gray-500 border-b border-gray-200">
          <th class="text-left px-3 py-2 w-1/6">Flips</th>
          <th class="text-left px-3 py-2 w-1/4">Win Rate</th>
          <th class="px-3 py-2">Probability</th>
        </tr></thead>
        <tbody id="results"></tbody>
      </table>
    </div>
  </div>

  <script>
    // Source of truth - matches ob.MineheadUPG
    // [id, name, maxLevel, costScaling, bonusPerLevel, _, description]
    // id = original index in the full MineheadUPG array (used for cost calc)
    const UPGRADES = [
      [0,  'Base_Damage_I',    9999, 1.10, 1,  0, 'Boosts_your_base_damage_by_+{'],
      [1,  'Numbahs',            17, 6,    1,  0, 'Increase_max_Tile_Number_to_$!'],
      [3,  'Bettah_Numbahs',   9999, 1.15, 10, 0, 'Boosts_odds_of_bigger_Tile_Numbers_by_}x'],
      [4,  'Mega_Damage_I',    9999, 1.12, 5,  0, 'Increases_all_damage_by_+{%'],
      [6,  'Extra_Lives',         7, 250,  1,  0, 'Start_each_game_with_+1_extra_life!'],
      [7,  'Base_Damage_II',   9999, 1.10, 3,  0, 'Boosts_your_base_damage_by_+{'],
      [8,  'Golden_Tiles',       16, 8,    1,  0, 'Click_on_up_to_{_Golden_Tiles_per_game'],
      [9,  'Big_Hit_Combos',   9999, 1.30, 1,  0, 'Increases_damage_by_+{%_per_tile_revealed'],
      [10, 'Boom_Blocker',        2, 1e9,  1,  0, 'Start_each_game_with_+{_Blocks'],
      [11, 'Final_Round_Fury', 9999, 1.30, 2,  0, 'Your_damage_is_}x_higher_on_last_life!'],
    ];

    function displayValue(name, lvl, bonusPerLevel) {
      const val = lvl * bonusPerLevel;
      switch (name) {
        case 'Numbahs':         return 'max ' + (1 + lvl);
        case 'Bettah_Numbahs':  return (lvl / 10 + 1).toFixed(1) + 'x';
        case 'Extra_Lives':     return '+' + val;
        case 'Base_Damage_I':
        case 'Base_Damage_II':  return '+' + val;
        case 'Mega_Damage_I':   return val + '%';
        case 'Golden_Tiles':    return '+' + val;
        case 'Big_Hit_Combos':  return val + '%';
        case 'Boom_Blocker':    return '+' + val;
        case 'Final_Round_Fury':return (lvl * bonusPerLevel / 100 + 1).toFixed(2) + 'x';
        default:                return val;
      }
    }

    function upgradeCost(idx, costScaling, level) {
      const base = (5 + idx + Math.pow(Math.max(0, idx - 2), 1.3)) * Math.pow(2, Math.max(0, idx - 4));
      return Math.floor(base * Math.pow(costScaling, level));
    }

    function formatCost(n) {
      if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return n;
    }

    function getUpgrade(name) {
      return UPGRADES.find(u => u[1] === name);
    }

    function idFor(name) {
      return name.toLowerCase().replace(/_/g, '-');
    }

    function lv(name) {
      return parseInt(document.getElementById(idFor(name)).value) || 0;
    }

    function lvOr(name, overrides) {
      return overrides && name in overrides ? overrides[name] : lv(name);
    }

    function calcBaseDamage() {
      return calcBaseDamageWith({});
    }

    function calcBaseDamageWith(overrides) {
      const bd1 = lvOr('Base_Damage_I', overrides) * getUpgrade('Base_Damage_I')[4];
      const bd2 = lvOr('Base_Damage_II', overrides) * getUpgrade('Base_Damage_II')[4];
      const mega1 = 1 + (lvOr('Mega_Damage_I', overrides) * getUpgrade('Mega_Damage_I')[4]) / 100;
      return Math.floor((1 + bd1 + bd2) * mega1);
    }

    function getSimParams(overrides) {
      const bdOverride = parseInt(document.getElementById('base-damage-override').value);
      const ov = overrides || {};
      return {
        numSims: parseInt(document.getElementById('sims').value) || 10000,
        bossHp: parseInt(document.getElementById('boss-hp').value) || 50,
        baseDamage: bdOverride ? bdOverride : calcBaseDamageWith(ov),
        bombs: parseInt(document.getElementById('bombs').value) || 3,
        tiles: parseInt(document.getElementById('tiles').value) || 12,
        lives: 3 + lvOr('Extra_Lives', ov) * getUpgrade('Extra_Lives')[4],
        maxTile: 1 + lvOr('Numbahs', ov) * getUpgrade('Numbahs')[4],
        bettahQty3: lvOr('Bettah_Numbahs', ov) * getUpgrade('Bettah_Numbahs')[4],
        goldenTiles: lvOr('Golden_Tiles', ov) * getUpgrade('Golden_Tiles')[4],
        bigHitCombo: lvOr('Big_Hit_Combos', ov) * getUpgrade('Big_Hit_Combos')[4] / 100,
        boomBlockers: lvOr('Boom_Blocker', ov) * getUpgrade('Boom_Blocker')[4],
        finalRoundFury: 1 + lvOr('Final_Round_Fury', ov) * getUpgrade('Final_Round_Fury')[4] / 100,
      };
    }

    // localStorage persistence
    const STORAGE_KEY = 'depth-charge-settings';
    function saveAll() {
      const data = {};
      UPGRADES.forEach(([, name]) => { data[idFor(name)] = lv(name); });
      ['sims', 'boss-hp', 'bombs', 'tiles', 'base-damage-override'].forEach(id => {
        data[id] = document.getElementById(id).value;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    function loadAll() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    const saved = loadAll();

    // Restore config inputs
    ['sims', 'boss-hp', 'bombs', 'tiles', 'base-damage-override'].forEach(id => {
      if (saved[id] !== undefined && saved[id] !== '') document.getElementById(id).value = saved[id];
      document.getElementById(id).addEventListener('input', saveAll);
    });

    const tbody = document.getElementById('upg-tbody');
    UPGRADES.forEach(([origIdx, name, maxLevel, costScaling, bonusPerLevel]) => {
      const id = name.toLowerCase().replace(/_/g, '-');
      const label = name.replace(/_/g, ' ');
      const maxStr = maxLevel >= 9999 ? '\u221E' : maxLevel;
      const initLvl = saved[id] || 0;
      const tr = document.createElement('tr');
      tr.className = 'border-b border-gray-100';
      tr.innerHTML = `
        <td class="px-3 py-2">${label}</td>
        <td class="px-3 py-2"><input class="w-16 text-right" id="${id}" type="number" value="${initLvl}" min="0" max="${maxLevel}"><span class="text-xs text-gray-400 ml-1">/${maxStr}</span></td>
        <td class="text-right px-3 py-2 font-mono" id="${id}-value">${displayValue(name, initLvl, bonusPerLevel)}</td>
        <td class="text-right px-3 py-2 font-mono text-gray-500" id="${id}-cost">${formatCost(upgradeCost(origIdx, costScaling, initLvl))}</td>
        <td class="px-3 py-2" id="${id}-eff"></td>
      `;
      const input = tr.querySelector('input');
      input.addEventListener('input', () => {
        const lvl = parseInt(input.value) || 0;
        document.getElementById(`${id}-value`).textContent = displayValue(name, lvl, bonusPerLevel);
        document.getElementById(`${id}-cost`).textContent = formatCost(upgradeCost(origIdx, costScaling, lvl));
        document.getElementById('base-damage-value').textContent = calcBaseDamage();
        saveAll();
      });
      tbody.appendChild(tr);
    });
    document.getElementById('base-damage-value').textContent = calcBaseDamage();
  </script>

  <script type="module">
    import init, { run_sim } from './pkg/idleon_depth_charge_minigame_optimizer.js';

    await init();

    function getBestWinRate(p) {
      const hits = run_sim(p.numSims, p.bossHp, p.baseDamage, p.lives, p.bombs, p.maxTile, p.bettahQty3, p.tiles, p.boomBlockers, p.goldenTiles, p.bigHitCombo, p.finalRoundFury);
      let bestIdx = 0;
      for (let i = 1; i < hits.length; i++) {
        if (hits[i] > hits[bestIdx]) bestIdx = i;
      }
      return hits[bestIdx] / p.numSims * 100;
    }

    document.getElementById('run').addEventListener('click', () => {
      const status = document.getElementById('status');
      const tbody = document.getElementById('results');

      status.textContent = 'Running...';
      tbody.innerHTML = '';

      // setTimeout so the UI updates before the blocking wasm call
      setTimeout(() => {
        const p = getSimParams();
        document.getElementById('debug').textContent = JSON.stringify(p, null, 2);

        const start = performance.now();
        const hits = run_sim(p.numSims, p.bossHp, p.baseDamage, p.lives, p.bombs, p.maxTile, p.bettahQty3, p.tiles, p.boomBlockers, p.goldenTiles, p.bigHitCombo, p.finalRoundFury);
        const ms = (performance.now() - start).toFixed(0);

        let bestIdx = 0;
        for (let i = 1; i < hits.length; i++) {
          if (hits[i] > hits[bestIdx]) bestIdx = i;
        }

        const bestPct = hits[bestIdx] / p.numSims * 100;

        for (let i = 0; i < hits.length; i++) {
          const pct = (hits[i] / p.numSims * 100).toFixed(2);
          const barWidth = bestPct > 0 ? (hits[i] / hits[bestIdx] * 100).toFixed(1) : 0;
          const isBest = i === bestIdx;
          const row = document.createElement('tr');
          row.className = isBest ? 'bg-emerald-50 font-bold' : '';
          row.innerHTML = `
            <td class="font-mono">${i + 1}${isBest ? '<span class="ml-1 text-xs bg-emerald-500 text-white px-1 py-0.5 rounded">BEST</span>' : ''}</td>
            <td class="font-mono">${pct}%</td>
            <td><div class="bg-gray-200 rounded h-5 w-full"><div class="h-full rounded ${isBest ? 'bg-emerald-500' : 'bg-blue-500'} transition-all" style="width:${barWidth}%"></div></div></td>
          `;
          tbody.appendChild(row);
        }

        status.textContent = `Done in ${ms}ms`;
      }, 10);
    });

    document.getElementById('optimize').addEventListener('click', () => {
      const btn = document.getElementById('optimize');
      const hasBdOverride = !!parseInt(document.getElementById('base-damage-override').value);
      const BD_UPGRADES = ['Base_Damage_I', 'Base_Damage_II', 'Mega_Damage_I'];

      // Clear existing efficiency cells
      UPGRADES.forEach(([, name]) => {
        document.getElementById(idFor(name) + '-eff').innerHTML = '';
      });

      // Count non-skipped upgrades for progress
      const eligible = UPGRADES.filter(([, name, maxLevel]) => {
        const cur = lv(name);
        if (cur >= maxLevel) return false;
        if (hasBdOverride && BD_UPGRADES.includes(name)) return false;
        return true;
      });
      const total = eligible.length + 1;
      let done = 0;

      btn.disabled = true;
      btn.textContent = `Analyzing... 0/${total}`;

      setTimeout(() => {
        const numSims = Math.max(100, Math.floor((parseInt(document.getElementById('sims').value) || 10000) / 10));
        const baseParams = getSimParams();
        baseParams.numSims = numSims;

        const baseline = getBestWinRate(baseParams);
        done++;
        btn.textContent = `Analyzing... ${done}/${total}`;

        const results = [];

        function processNext(i) {
          if (i >= UPGRADES.length) {
            renderEfficiency(results);
            btn.disabled = false;
            btn.textContent = 'Optimize Next Upgrade';
            return;
          }

          const [origIdx, name, maxLevel, costScaling] = UPGRADES[i];
          const cur = lv(name);
          const cell = document.getElementById(idFor(name) + '-eff');

          if (cur >= maxLevel) {
            cell.innerHTML = '<span class="text-gray-400 text-xs">-</span>';
            setTimeout(() => processNext(i + 1), 0);
            return;
          }

          if (hasBdOverride && BD_UPGRADES.includes(name)) {
            cell.innerHTML = '<span class="text-gray-400 text-xs">-</span>';
            setTimeout(() => processNext(i + 1), 0);
            return;
          }

          setTimeout(() => {
            const overrideParams = getSimParams({ [name]: cur + 1 });
            overrideParams.numSims = numSims;
            const newRate = getBestWinRate(overrideParams);
            const delta = newRate - baseline;
            const cost = upgradeCost(origIdx, costScaling, cur);
            const efficiency = cost > 0 ? delta / cost : 0;

            results.push({ name, delta, cost, efficiency });
            done++;
            btn.textContent = `Analyzing... ${done}/${total}`;

            processNext(i + 1);
          }, 0);
        }

        setTimeout(() => processNext(0), 0);
      }, 10);
    });

    function renderEfficiency(results) {
      let maxEff = 0;
      for (let i = 0; i < results.length; i++) {
        if (results[i].efficiency > maxEff) maxEff = results[i].efficiency;
      }

      results.forEach(({ name, delta, efficiency }) => {
        const cell = document.getElementById(idFor(name) + '-eff');
        if (delta <= 0 || efficiency <= 0) {
          cell.innerHTML = '<span class="text-gray-400 text-xs">+0%</span>';
          return;
        }

        const isBest = maxEff > 0 && efficiency === maxEff;
        const barWidth = maxEff > 0 ? (efficiency / maxEff * 100).toFixed(1) : 0;
        const barColor = isBest ? 'bg-emerald-500' : 'bg-blue-400';
        const deltaStr = delta < 0.01 ? '+<0.01%' : `+${delta.toFixed(2)}%`;

        cell.innerHTML = `
          <div class="flex items-center gap-1">
            <div class="bg-gray-200 rounded h-4 flex-1"><div class="h-full rounded ${barColor}" style="width:${barWidth}%"></div></div>
            <span class="text-xs font-mono whitespace-nowrap ${isBest ? 'text-emerald-600 font-bold' : 'text-gray-600'}">${deltaStr}</span>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
